<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lit Amor | Admin Insights</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 30px; }
        .card { background: #1e293b; padding: 30px; border-radius: 15px; border: 1px solid #334155; width: 200px; text-align: center; transition: 0.3s; }
        .card:hover { border-color: #38bdf8; transform: translateY(-5px); }
        .value { font-size: 2rem; font-weight: bold; color: #38bdf8; display: block; margin-top: 10px; }
        h1 { font-size: 2.5rem; letter-spacing: -1px; }
        .status { color: #10b981; font-size: 0.9rem; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>Vibe-Check <span style="color: #38bdf8;">Analytics</span></h1>
    <p>Monitoring real-time soulmate matches for Lit Amor</p>

    <div class="grid">
        <div class="card">Users Joined <span id="users" class="value">0</span></div>
        <div class="card">Matches Today <span id="matches" class="value">0</span></div>
        <div class="card">Avg Vibe Score <span id="score" class="value">0%</span></div>
        <div class="card">Trending <span id="genre" class="value" style="font-size: 1.2rem;">...</span></div>
    </div>

    <p class="status">● Live Data Stream Active</p>

    <script>
        async function updateDashboard() {
            try {
                const response = await fetch('http://127.0.0.1:5001/api/stats');
                const data = await response.json();
                
                // Update the UI with smooth numbers
                document.getElementById('users').innerText = data.total_users;
                document.getElementById('matches').innerText = data.matches_today;
                document.getElementById('score').innerText = data.avg_vibe_score;
                document.getElementById('genre').innerText = data.trending_genre;
            } catch (err) {
                console.log("Waiting for Python server...");
            }
        }

        // Refresh data every 3 seconds
        setInterval(updateDashboard, 3000);
        updateDashboard(); // Initial load
    </script>
</body>
</html>
